name: Feature Request
description: "Feature requests only. Questions, support requests, and configuration help posts are out of scope."
title: "[Feature] "
body:
  - type: checkboxes
    id: ensure
    attributes:
      label: Verification Steps
      description: Requests that ignore these rules may be closed without further discussion.
      options:
        - label: I have carefully read the [INI configuration file](https://github.com/Bush2021/chrome_plus/blob/main/src/chrome%2B%2B.ini) and checked whether an existing option already covers my use case.
          required: true
        - label: I searched [GitHub Issues](https://github.com/Bush2021/chrome_plus/issues) and did not find the same request.
          required: true
        - label: This is not a question, support request, configuration help request, or "how do I do this" post.
          required: true
        - label: I describe a concrete use case and expected behavior instead of a vague idea.
          required: true
        - label: This request is not better served by a browser extension or dedicated external software.
          required: true
        - label: I am willing to implement the feature and submit a pull request.
          required: false
        - label: I understand that feature requests without implementation interest are likely to be closed.
          required: true
        - label: I make sure to describe the feature in English.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Use the following format:
        1. Use case
        2. Expected behavior
        3. Why existing options are insufficient
        4. Why an extension or external tool is not a better solution
    validations:
      required: true
